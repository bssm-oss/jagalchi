databaseChangeLog:
  - changeSet:
      id: 0013-create-notification-settings-table
      author: jagalchi
      changes:
        - createTable:
            tableName: notification_settings
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: notification_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_enabled
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: notification_settings
            constraintName: uk_user_notification_type
            columnNames: user_id, notification_type
        - addForeignKeyConstraint:
            baseTableName: notification_settings
            baseColumnNames: user_id
            constraintName: fk_notification_settings_user
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: idx_notification_settings_user_id
            tableName: notification_settings
            columns:
              - column:
                  name: user_id
