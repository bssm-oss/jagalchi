spring:
  application:
    name: jagalchi-server

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080

jagalchi:
  auth:
    jwt:
      secret: ${JAGALCHI_AUTH_JWT_SECRET}
