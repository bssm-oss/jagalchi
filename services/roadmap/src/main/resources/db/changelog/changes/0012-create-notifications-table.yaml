databaseChangeLog:
  - changeSet:
      id: 0012-create-notifications-table
      author: jagalchi
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
              - column:
                  name: reference_id
                  type: bigint
              - column:
                  name: is_read
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: user_id
            constraintName: fk_notifications_user
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: idx_notifications_user_id
            tableName: notifications
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_notifications_user_id_is_read
            tableName: notifications
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_read
        - createIndex:
            indexName: idx_notifications_type
            tableName: notifications
            columns:
              - column:
                  name: type
