version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore(deps)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      dev-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "*"
      production-dependencies:
        applies-to: version-updates
        dependency-type: "production"
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Seoul"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "action"
    commit-message:
      prefix: "action(deps)"
