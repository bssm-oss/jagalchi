name: "🐛 Bug"
description: 버그 리포트
title: "[Bug] "
labels: ["type: fix"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 단계를 알려주세요.
      placeholder: |
        1. '...'로 이동
        2. '...' 클릭
        3. 에러 발생
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하나요?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 가능하면 스크린샷을 첨부해주세요.
    validations:
      required: false