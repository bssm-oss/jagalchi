name: Auto Label

on:
  pull_request:
    types: [opened, edited]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Auto Label PR
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const labels = [];

            if (title.startsWith('feat')) labels.push('type: feat');
            else if (title.startsWith('fix')) labels.push('type: fix');
            else if (title.startsWith('docs')) labels.push('type: docs');
            else if (title.startsWith('refactor')) labels.push('type: refactor');
            else if (title.startsWith('chore')) labels.push('type: chore');
            else if (title.startsWith('test')) labels.push('type: test');
            else if (title.startsWith('perf')) labels.push('type: perf');
            else if (title.startsWith('ai')) labels.push('type: ai');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }

  label-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Auto Assign Issue Creator
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.payload.issue.user.login]
            });

      - name: Auto Label Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labels = [];

            // 제목/본문 기반 라벨링
            if (title.includes('bug') || title.includes('버그') || body.includes('bug')) {
              labels.push('type: bug');
            } else if (title.includes('feature') || title.includes('기능') || title.includes('feat')) {
              labels.push('type: feat');
            } else if (title.includes('docs') || title.includes('문서')) {
              labels.push('type: docs');
            } else if (title.includes('question') || title.includes('질문')) {
              labels.push('type: question');
            }

            // 우선순위
            if (title.includes('urgent') || title.includes('긴급') || title.includes('critical')) {
              labels.push('priority: high');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }