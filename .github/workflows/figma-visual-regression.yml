name: Figma Visual Regression

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  pull-requests: write

jobs:
  visual-regression:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Prepare Figma baseline
        run: |
          if [ ! -d "public/figma-reference" ]; then
            echo "❌ public/figma-reference is missing. Run local figma export first and commit baseline files."
            exit 1
          fi
          mkdir -p visual-tests/figma
          cp public/figma-reference/*.png visual-tests/figma/

      - name: Start Storybook
        run: |
          pnpm storybook > /tmp/storybook.log 2>&1 &
          STORYBOOK_PID=$!
          echo "STORYBOOK_PID=$STORYBOOK_PID" >> $GITHUB_ENV

          for i in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:6006 >/dev/null; then
              echo "Storybook is ready."
              exit 0
            fi
            sleep 2
          done

          echo "❌ Storybook did not become ready in time."
          cat /tmp/storybook.log
          exit 1

      - name: Capture and compare with Figma
        run: |
          pnpm figma:screenshots
          pnpm figma:compare
          pnpm figma:report

      - name: Upload visual diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figma-visual-regression-report
          path: |
            visual-tests/comparison-report.json
            visual-tests/report.html
            visual-tests/figma
            visual-tests/actual
            visual-tests/diff

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'visual-tests/comparison-report.json';

            if (!fs.existsSync(reportPath)) {
              console.log('No comparison report found, skipping comment');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const failedList = report.results
              .filter(r => !r.passed)
              .map(r => `- \`${r.name}\` — ${r.diffPercentage}% 차이`)
              .join('\n');

            const statusLine = report.failed > 0
              ? `> ❌ ${report.failed}개 컴포넌트가 Figma 디자인과 다릅니다.`
              : `> ✅ 모든 컴포넌트가 Figma 디자인과 일치합니다.`;

            const body = [
              '## Figma Visual Regression',
              '',
              statusLine,
              '',
              `| | |`,
              `|---|---|`,
              `| Total | ${report.total} |`,
              `| ✅ Passed | ${report.passed} |`,
              `| ❌ Failed | ${report.failed} |`,
              `| Threshold | ${report.threshold}% |`,
              '',
              ...(report.failed > 0 ? [
                '### ❌ 불일치 컴포넌트',
                failedList,
                '',
              ] : []),
              `[전체 리포트 보기](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes('## Figma Visual Regression'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Stop Storybook
        if: always()
        run: kill ${STORYBOOK_PID}
