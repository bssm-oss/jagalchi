name: PR Guide

on:
  pull_request:
    types: [opened]
    branches: [main, develop]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
      - name: Auto assign PR creator
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              assignees: [context.payload.pull_request.user.login]
            })

      - name: Post review guide comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Code Review Guide / 코드 리뷰 가이드

### 1. 리뷰 기준 / Review Criteria

| 항목 | 확인 사항 |
|------|----------|
| **기능 / Function** | 요구사항대로 동작하는가? |
| **코드 품질 / Quality** | 가독성, 네이밍, 구조가 적절한가? |
| **컨벤션 / Convention** | 프로젝트 컨벤션을 준수하는가? |
| **테스트 / Test** | 테스트가 충분한가? |
| **성능 / Performance** | 불필요한 렌더링, 비효율적인 코드가 없는가? |
| **보안 / Security** | 보안 취약점은 없는가? |

### 2. 코멘트 타입 / Comment Types

| 타입 | 설명 |
|------|------|
| **Suggestion** | 개선 제안 (선택적) |
| **Question** | 의도 확인 질문 |
| **Issue** | 반드시 수정 필요 |
| **Praise** | 좋은 코드 칭찬 |
| **Note** | 참고 사항 공유 |

<details>
<summary>💬 코멘트 예시 보기 / View Examples</summary>

#### Suggestion
> 이 부분 \`useMemo\`로 최적화하면 어떨까요?
\`\`\`tsx
// Before
const filtered = items.filter(item => item.active);

// After
const filtered = useMemo(() => items.filter(item => item.active), [items]);
\`\`\`

#### Question
> 이 로직의 의도가 뭐예요? \`status === 0\`일 때 early return 하는 이유가 있나요?

#### Issue
> 🚨 여기 null 체크 빠졌어요. \`user\`가 없을 때 크래시 날 것 같습니다.
\`\`\`tsx
// Before
const name = user.name;

// After
const name = user?.name ?? 'Unknown';
\`\`\`

#### Praise
> 👍 이 구조 깔끔하네요! 재사용하기 좋을 것 같아요.

#### Note
> 📝 FYI: 이 API는 v2에서 deprecated 됩니다. 마이그레이션 계획 세워야 할 것 같아요.

</details>

### 3. 리뷰 원칙 / Review Principles

- ⏰ **빠르게**: PR 올라온 후 24시간 이내 리뷰 시작
- 🎯 **구체적으로**: "이상해요" ❌ → "여기서 null이 들어오면 크래시 날 것 같아요" ✅
- 🤝 **존중하며**: 코드를 비판, 사람을 비판 X
- 💡 **대안 제시**: 문제만 지적하지 말고 해결책도 같이

### 4. 승인 조건 / Approval Requirements

- ✅ 최소 1명의 Approve 필수
- ✅ 모든 Issue 코멘트 해결
- ✅ CI 테스트 통과
- ✅ 충돌 해결 완료

#### 셀프 머지 / Self Merge

> 혼자 작업하는 경우 셀프 머지를 허용합니다.

- 셀프 코드 리뷰 필수
- CI 테스트 통과 필수
- PR 설명에 "셀프 리뷰 완료" 명시`
            })
