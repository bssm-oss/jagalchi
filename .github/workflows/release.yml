# ⚠️ 현재 미사용 (태그/릴리스 없음)
# 릴리스 사용 시 활성화 필요
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        uses: actions/github-script@v7
        id: release-notes
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            const previousTag = releases[0]?.tag_name || '';
            const currentTag = context.ref.replace('refs/tags/', '');
            
            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: previousTag || 'main',
              head: currentTag
            });
            
            const features = [];
            const fixes = [];
            const others = [];
            
            commits.commits.forEach(commit => {
              const msg = commit.commit.message.split('\n')[0];
              if (msg.startsWith('feat')) features.push(`- ${msg}`);
              else if (msg.startsWith('fix')) fixes.push(`- ${msg}`);
              else if (!msg.startsWith('chore') && !msg.startsWith('docs')) others.push(`- ${msg}`);
            });
            
            let notes = '';
            if (features.length) notes += `## ✨ Features\n${features.join('\n')}\n\n`;
            if (fixes.length) notes += `## 🐛 Bug Fixes\n${fixes.join('\n')}\n\n`;
            if (others.length) notes += `## 🔄 Other Changes\n${others.join('\n')}\n\n`;
            
            return notes || 'No significant changes.';
          result-encoding: string

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: ${{ steps.release-notes.outputs.result }},
              draft: false,
              prerelease: tag.includes('-alpha') || tag.includes('-beta') || tag.includes('-rc')
            });