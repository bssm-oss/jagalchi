name: Dependency Review

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check dependency graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          status="$(gh api "repos/$GH_REPO" --jq '.security_and_analysis.dependency_graph.status // "unavailable"')"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" != "enabled" ]; then
            echo "::warning::Dependency graph is not enabled for this repository; skipping dependency review."
          fi

      - name: Review dependency changes
        if: steps.dependency-graph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
