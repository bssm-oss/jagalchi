name: "✨ Feature"
description: 새로운 기능 제안
title: "[Feature] "
labels: ["type: feat"]
body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능인지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 필요한 이유
      description: 왜 이 기능이 필요한가요?
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 구현에 필요한 작업들을 나열해주세요.
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
    validations:
      required: false